name: CI Lab API

on:
  push:
    branches: [ main, master ]
    paths:
      - 'apps/lab/api/**'
      - 'packages/**'
  pull_request:
    branches: [ main, master ]
    paths:
      - 'apps/lab/api/**'
      - 'packages/**'

jobs:
  build:
    name: Build & Test API
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate --schema=packages/database/schema.prisma

      - name: Build
        run: npm run build -w apps/lab/api --if-present
