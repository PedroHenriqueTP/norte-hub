name: CI Lab Web

on:
  push:
    branches: [ main, master ]
    paths:
      - 'apps/lab/web/**'
      - 'packages/**'
  pull_request:
    branches: [ main, master ]
    paths:
      - 'apps/lab/web/**'
      - 'packages/**'

jobs:
  build:
    name: Build & Lint Web
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint -w apps/lab/web --if-present

      - name: Build
        run: npm run build -w apps/lab/web
