name: CI Bookshelf Modules

on:
  push:
    branches: [ main, master ]
    paths:
      - 'apps/bookshelf/**'
      - 'packages/**'
  pull_request:
    branches: [ main, master ]
    paths:
      - 'apps/bookshelf/**'
      - 'packages/**'

jobs:
  build:
    name: Validate Bookshelf Apps
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Bookshelf Workspaces
        run: |
          # Build each sub-workspace inside bookshelf if a build script is defined
          npm run build --workspaces --if-present
